version: 0.1
cli:
  version: 1.21.0
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.6.27
    - checkov@3.2.47
    - eslint@8.57.0
    - git-diff-check
    - markdownlint@0.39.0
    - osv-scanner@1.7.0
    - prettier@3.2.5
    - trivy@0.50.1
    - trufflehog@3.71.0
    - yamllint@1.35.1
  ignore:
    - linters: [eslint, prettier]
      paths:
        - "*/dist/**"
        - packages/*/lib/**
runtimes:
  enabled:
    - node@18.12.1
    - python@3.10.8
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - commitlint
    - yarn-check
    - trunk-upgrade-available
    - yarn-install
  definitions:
    - id: yarn-install
      triggers:
        - files: [package.json]
      run: yarn install
