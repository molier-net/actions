version: 0.1
cli:
  version: 1.22.2
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.7.1
    - checkov@3.2.161
    - eslint@9.6.0
    - git-diff-check
    - markdownlint@0.41.0
    - osv-scanner@1.8.1
    - prettier@3.3.2
    - trivy@0.52.2
    - trufflehog@3.79.0
    - yamllint@1.35.1
  ignore:
    - linters: [eslint, prettier]
      paths:
        - "*/dist/**"
        - packages/*/lib/**
runtimes:
  enabled:
    - node@18.12.1
    - python@3.10.8
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - commitlint
    - yarn-check
    - trunk-upgrade-available
    - yarn-install
  definitions:
    - id: yarn-install
      triggers:
        - files: [package.json]
      run: yarn install
