version: 0.1
cli:
  version: 1.19.0
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.6.26
    - checkov@3.1.54
    - eslint@8.56.0
    - git-diff-check
    - markdownlint@0.38.0
    - osv-scanner@1.5.0
    - prettier@3.1.1
    - trivy@0.48.2
    - trufflehog@3.63.7
    - yamllint@1.33.0
  ignore:
    - linters: [eslint, prettier]
      paths:
        - "*/dist/**"
        - packages/*/lib/**
runtimes:
  enabled:
    - node@18.12.1
    - python@3.10.8
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - commitlint
    - yarn-check
    - trunk-upgrade-available
    - yarn-install
  definitions:
    - id: yarn-install
      triggers:
        - files: [package.json]
      run: yarn install
